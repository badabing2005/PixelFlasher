name: Build for macOS 11+

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Build tags'

jobs:
  build_mac:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: List Cellar directory
        run: ls /opt/homebrew/Cellar

      - name: Updating Homebrew Packages
        run : |
          if brew tap-info aws/tap >/dev/null 2>&1; then
            brew untap aws/tap
          fi
          rm -rf /opt/homebrew/etc/openssl@1.1
          if brew list --formula | grep -q '^openssl@1\.1$'; then
            brew uninstall --ignore-dependencies openssl@1.1 || true
          fi

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install wxPython
        run: pip install wxPython

      - name: Install node
        run: |
          if brew tap-info aws/tap >/dev/null 2>&1; then
            brew untap aws/tap
          fi
          brew install node

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Install create-dmg
        run: |
          npm cache clean --force
          npm install --global create-dmg
          # Check if 'util.isDate' is patched
          if grep -q "util.isDate" "$(npm root -g)/create-dmg/node_modules/macos-alias/lib/encode.js"; then
            echo "Patching util.isDate..."
            sed -i.bak "s/util.isDate/((val) => Object.prototype.toString.call(val) === '[object Date]')/g" \
              "$(npm root -g)/create-dmg/node_modules/macos-alias/lib/encode.js"
          fi

      - name: Add Python 3.13 to PATH
        run: export PATH=/opt/homebrew/Cellar/python@3.13/bin:$PATH

      - name: Create virtual environment
        run: python3.13 -m venv myenv
        shell: bash

      - name: Install requirements
        run: |
          ./myenv/bin/python -m pip install --upgrade pip
          PYLZ4_USE_SYSTEM_LZ4="False" ARCHFLAGS="-arch x86_64 -arch arm64" ./myenv/bin/python -m pip install --no-binary 'bsdiff4,psutil,PyYAML,MarkupSafe,cffi,lz4' -r requirements.txt
        shell: bash

      # cryptography may resolve to an arm64-only wheel on Apple Silicon runners.
      # Force the published universal2 wheel so PyInstaller target_arch=universal2
      # can include cryptography.hazmat.bindings._rust (required at runtime).
      - name: Force universal2 cryptography wheel
        shell: bash
        run: |
          set -euo pipefail
          WHEEL_DIR="$(mktemp -d)"
          ./myenv/bin/python -m pip uninstall -y cryptography
          ./myenv/bin/python -m pip download 'cryptography>=42.0.5,<49' \
            --platform macosx_10_9_universal2 \
            --python-version 313 \
            --only-binary=:all: \
            --no-deps \
            --dest "$WHEEL_DIR"
          ls -la "$WHEEL_DIR"
          ./myenv/bin/python -m pip install --no-cache-dir --no-index --find-links "$WHEEL_DIR" cryptography
          RUST_SO="$(./myenv/bin/python - <<'PY'
          import pathlib
          import cryptography
          root = pathlib.Path(cryptography.__file__).resolve().parent
          matches = sorted(root.rglob('_rust*.so'))
          if not matches:
              raise SystemExit('cryptography._rust extension not found after install')
          print(matches[0])
          PY
          )"
          echo "cryptography _rust extension: $RUST_SO"
          ARCHS="$(lipo -archs "$RUST_SO")"
          echo "architectures: $ARCHS"
          echo "$ARCHS" | grep -qw arm64
          echo "$ARCHS" | grep -qw x86_64

      - name: List modules and their versions
        run: ./myenv/bin/python -m pip freeze
        shell: bash

      - name: Verify universal2 extension modules
        shell: bash
        run: |
          ./myenv/bin/python - <<'PY'
          import importlib.machinery
          import pathlib
          import fnmatch
          import site
          import subprocess
          import sys

          ext_suffixes = tuple(importlib.machinery.EXTENSION_SUFFIXES)
          if not ext_suffixes:
            print("Could not determine extension suffixes.", file=sys.stderr)
            sys.exit(1)

          # Keep empty unless a dependency is intentionally single-arch AND
          # excluded from the frozen app. Do not allowlist cryptography —
          # its _rust extension must be universal2 for the macOS build.
          allowlist_patterns = [
            # Example: "*/site-packages/somepkg/someext*.so"
          ]

          def iter_site_package_roots() -> list[pathlib.Path]:
            roots = set()
            for path in site.getsitepackages():
              roots.add(pathlib.Path(path).resolve())
            user_site = site.getusersitepackages()
            if user_site:
              roots.add(pathlib.Path(user_site).resolve())
            return sorted(roots)

          def is_extension_module(path: pathlib.Path) -> bool:
            return any(path.name.endswith(suffix) for suffix in ext_suffixes)

          def is_allowlisted(path: pathlib.Path) -> bool:
            normalized = path.as_posix()
            return any(fnmatch.fnmatch(normalized, pattern) for pattern in allowlist_patterns)

          def check_arches(path: pathlib.Path) -> tuple[bool, str]:
            result = subprocess.run(
              ["lipo", "-archs", str(path)],
              check=False,
              capture_output=True,
              text=True,
            )
            if result.returncode != 0:
              return False, f"lipo failed: {result.stderr.strip()}"
            archs = set(result.stdout.strip().split())
            ok = {"arm64", "x86_64"}.issubset(archs)
            return ok, " ".join(sorted(archs))

          failures = []
          checked = 0

          for root in iter_site_package_roots():
            if not root.exists():
              continue
            for path in root.rglob("*"):
              if not path.is_file() or not is_extension_module(path):
                continue
              if is_allowlisted(path):
                continue
              checked += 1
              ok, details = check_arches(path)
              if not ok:
                failures.append((path, details))

          print(f"Checked {checked} compiled extension modules for universal2 slices.")

          if failures:
            print("Universal2 guard failed. Non-universal extension modules found:", file=sys.stderr)
            for path, details in failures[:50]:
              print(f" - {path}: {details}", file=sys.stderr)
            if len(failures) > 50:
              print(f" ... and {len(failures) - 50} more", file=sys.stderr)
            sys.exit(1)

          print("Universal2 guard passed: all extension modules include arm64 and x86_64.")
          PY

      - name: Build application
        id: build_app
        run: |
          export PATH="$PWD/myenv/bin:$PATH"
          ./build.sh
        shell: bash

      # Guard against shipping another build that omits cryptography's Rust
      # binding (the v9.1.3.0 launch crash) or that embeds a single-arch .so.
      - name: Smoke-check cryptography._rust in app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP="dist/PixelFlasher.app"
          test -d "$APP"
          FOUND=0
          while IFS= read -r so; do
            FOUND=1
            echo "Found: $so"
            ARCHS="$(lipo -archs "$so")"
            echo "  architectures: $ARCHS"
            echo "$ARCHS" | grep -qw arm64
            echo "$ARCHS" | grep -qw x86_64
          done < <(find "$APP" -type f \( -name '_rust*.so' -o -name '_rust*.dylib' \))
          if [[ "$FOUND" -eq 0 ]]; then
            echo "ERROR: cryptography.hazmat.bindings._rust not found in $APP" >&2
            echo "This is the ModuleNotFoundError launch-crash failure mode." >&2
            exit 1
          fi
          echo "cryptography._rust present and universal2 in app bundle."

      - name: Upload PixelFlasher.app as artifact
        uses: actions/upload-artifact@v7
        with:
          name: PixelFlasher.app for macOS 11+
          path: dist/PixelFlasher.app

      - name: Rename the file names
        run: mv dist/PixelFlasher.dmg "dist/PixelFlasher_MacOS.dmg"

      - name: Get sha256
        run: |
          shasum -a 256 "dist/PixelFlasher_MacOS.dmg" > "dist/PixelFlasher_MacOS.dmg.sha256"
          cat "dist/PixelFlasher_MacOS.dmg.sha256"

      - name: List contents of dist directory
        run: ls ./ dist/

      - name: Upload macOS 11+ Artifact
        uses: actions/upload-artifact@v7
        id: upload_artifact_macos
        with:
          name: PixelFlasher_MacOS.dmg Artifacts
          path: |
            dist/PixelFlasher_MacOS.dmg
            dist/PixelFlasher_MacOS.dmg.sha256
